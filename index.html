<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Q2les 2 Aangifte - Evi de Vries</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --police: #1a2a6c; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; }
        body { background-color: #0a0e14; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; height: 100vh; overflow: hidden; box-sizing: border-box; }
        
        /* Inlogscherm Style */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #0a0e14; display: flex; align-items: center; justify-content: center; 
            z-index: 9999;
        }
        .login-box { 
            background: #1c222d; padding: 40px; border-radius: 12px; 
            border: 2px solid var(--police); text-align: center; width: 350px;
        }
        .login-box input { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 4px; 
            border: 1px solid #333; background: #0a0e14; color: white; text-align: center; font-size: 1em;
        }

        .main-wrapper { display: flex; gap: 20px; max-width: 1500px; margin: auto; height: calc(100vh - 40px); visibility: hidden; }
        
        #chat-section { flex: 1; min-width: 380px; background: #1c222d; border: 2px solid var(--police); display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f4f7f6; }
        .status-header { background: var(--police); padding: 10px; color: white; display: flex; justify-content: space-between; font-size: 0.8em; align-items: center; }
        #stress-meter { height: 5px; background: var(--success); width: 100%; transition: 1s; }

        .gem-link { background: #00d1ff; color: #1a2a6c; padding: 2px 8px; border-radius: 4px; text-decoration: none; font-weight: bold; }
        
        #aangifte-section { flex: 1.5; min-width: 500px; background: #ffffff; border: 2px solid #bdc3c7; display: flex; flex-direction: column; padding: 20px; border-radius: 8px; color: #333; overflow-y: auto; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 0.9em; }
        .bot { align-self: flex-start; background: #e8e8e8; color: #2c3e50; }
        .user-msg { align-self: flex-end; background: var(--police); color: white; }
        
        textarea { width: 100%; min-height: 180px; border: 2px solid var(--police); padding: 10px; border-radius: 4px; resize: none; margin-bottom: 10px; }
        
        #check-section { margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; border-left: 5px solid var(--police); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 8px; }
        .dot-green { background: var(--success); }
        .dot-red { background: var(--danger); }

        .feed-item { background: #f9f9f9; border: 1px solid #ddd; padding: 12px; margin-top: 10px; border-radius: 8px; }
        button { background: var(--police); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
        .btn-pv { background: var(--success); width: 100%; margin: 10px 0; font-weight: bold; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:white; margin-bottom: 20px;">Aangifte Systeem</h2>
        <input type="text" id="nameInput" placeholder="Voornaam student...">
        <input type="text" id="classInput" placeholder="Klas (bijv. Alfa, Bravo...)">
        <button onclick="login()" style="width:100%; margin-top: 10px; font-weight: bold;">INLOGGEN</button>
        <p id="login-error" style="color:var(--danger); margin-top:15px; font-size:0.8em; display:none;">Vul een geldige voornaam en NATO-klas in.</p>
    </div>
</div>

<div class="main-wrapper" id="app-content">
    <div id="chat-section">
        <div class="status-header">
            <div>
                <span id="display-info">USER: - | KLAS: -</span>
                <a href="HIER_JOUW_GEM_LINK_PLAKKEN" target="_blank" class="gem-link">LIVE VERHOOR</a>
            </div>
            <span id="stress-txt">STATUS: AFWACHTEND</span>
        </div>
        <div id="stress-meter"></div>
        <div id="messages">
            <div class="bubble bot"><b>Evi:</b> Goedemorgen.</div>
        </div>
        <div style="padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #eee;">
            <input type="text" id="botInput" style="flex:1; padding:10px; border:1px solid #ccc; color: black;" placeholder="Stel een vraag..." onkeypress="if(event.key==='Enter') chatWithBot()">
            <button onclick="chatWithBot()">VRAAG</button>
        </div>
    </div>

    <div id="aangifte-section">
        <div id="pdf-content">
            <h2 style="color:var(--police); margin:0;">PV Aangifte</h2>
            <p id="pv-meta" style="font-size: 0.8em; color: #666; margin-bottom: 10px;">Slachtoffer: E. de Vries | Verbalisant: -</p>
            <textarea id="pvInput" placeholder="Schrijf hier de aangifte..." oninput="checkPV()"></textarea>
            
            <div id="check-section" class="no-print">
                <div id="c1" class="status-dot"></div><span>Geen toestemming</span><br>
                <div id="c2" class="status-dot"></div><span>Vernieling</span><br>
                <div id="c3" class="status-dot"></div><span>Omschrijving</span><br>
                <div id="c4" class="status-dot"></div><span>Ik-vorm</span><br>
                <div id="c5" class="status-dot"></div><span>Gouden W's</span><br>
                <div id="c6" class="status-dot"></div><span>Redenen van wetenschap</span><br>
                <div id="c7" class="status-dot"></div><span>OVT & Actieve vormen</span>
            </div>
            <div id="feed-container"></div>
        </div>
        <button class="btn-pv no-print" onclick="submitToFirebase()">OPSLAAN IN ARCHIEF</button>
        <button class="no-print" onclick="downloadPDF()" style="background:#e67e22; margin-bottom:5px;">DOWNLOAD PDF</button>
        <button class="no-print" onclick="clearDatabase()" style="background:#95a5a6; font-size:0.7em;">WIS ARCHIEF</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyC-Of0AUOd-kVo2RKxYc-68Gr-RO4HdRk0", authDomain: "q2aangifteles2.firebaseapp.com", databaseURL: "https://q2aangifteles2-default-rtdb.europe-west1.firebasedatabase.app", projectId: "q2aangifteles2" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentName = "";
    let currentClass = "";
    let stress = 15;

    const allowedClasses = ["alfa", "bravo", "charlie", "delta", "echo", "foxtrot", "golf", "hotel", "juliett", "kilo"];

    function login() {
        const name = document.getElementById('nameInput').value.trim();
        const klas = document.getElementById('classInput').value.trim().toLowerCase();
        
        if(name.length > 1 && allowedClasses.includes(klas)) {
            currentName = name;
            currentClass = klas;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').style.visibility = 'visible';
            document.getElementById('display-info').innerText = `USER: ${currentName} | KLAS: ${currentClass.toUpperCase()}`;
            document.getElementById('pv-meta').innerText = `Slachtoffer: E. de Vries | Verbalisant: ${currentName}`;
            loadArchief();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    // --- De rest van je logica (chatWithBot, checkPV, etc.) blijft hetzelfde, maar gebruik nu de nieuwe paden ---

    function submitToFirebase() {
        const txt = document.getElementById('pvInput').value.trim();
        if(!txt) return;
        db.ref(`posts/${currentClass}`).push({ 
            student: currentName,
            tekst: txt, 
            timestamp: new Date().toLocaleString() 
        });
        document.getElementById('pvInput').value = '';
        checkPV();
        alert("Opgeslagen!");
    }

    function loadArchief() {
        db.ref(`posts/${currentClass}`).on('value', (snap) => {
            const container = document.getElementById('feed-container');
            container.innerHTML = "<h3 class='no-print' style='margin-top:20px;'>ARCHIEF "+currentClass.toUpperCase()+"</h3>";
            snap.forEach(child => {
                const item = child.val();
                const div = document.createElement('div');
                div.className = 'feed-item';
                div.innerHTML = `<div style="font-size:0.75em; color:#888;">${item.timestamp} - <b>${item.student}</b></div><div>${item.tekst}</div>`;
                container.prepend(div);
            });
        });
    }

    // [Plaats hier de rest van de functies: chatWithBot, checkPV, updateStressUI, addBubble, downloadPDF, clearDatabase uit je vorige code]
    // Let op: in clearDatabase() gebruik nu db.ref(`posts/${currentClass}`).remove();
</script>
</body>
</html>
